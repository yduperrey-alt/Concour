name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances système
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev build-essential

      - name: Installer Buildozer et Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Compiler l'APK
        run: |
          yes | buildozer android debug

      - name: Publier l'APK en artifact téléchargeable
        uses: actions/upload-artifact@v4
        with:
          name: concours-finder-apk
          path: bin/*.apk
